kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true" 
    # Sans ce label, le pod NGINX Ingress reste en Pending indéfiniment
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # Tunnels entre votre machine et le conteneur kind
      # Sans ça, http://localhost ne répond pas même avec l'Ingress déployé
  - role: worker
  - role: worker
