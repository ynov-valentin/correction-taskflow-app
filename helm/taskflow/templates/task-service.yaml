apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
spec:
  {{- if not .Values.taskService.hpa.enabled }}
  replicas: {{ .Values.taskService.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: task-service
          image: "{{ .Values.image.prefix }}-task-service:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PORT
              value: "3002"
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.db }}"
            - name: REDIS_URL
              value: redis://redis-master:6379
            - name: OTEL_SERVICE_NAME
              value: task-service
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
          ports:
            - containerPort: 3002
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.taskService.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
  labels:
    app: task-service
spec:
  selector:
    app: task-service
  ports:
    - name: http
      port: 3002
      targetPort: 3002
{{- if .Values.taskService.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-service
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-service
  minReplicas: {{ .Values.taskService.hpa.minReplicas }}
  maxReplicas: {{ .Values.taskService.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.taskService.hpa.targetCPU }}
{{- end }}