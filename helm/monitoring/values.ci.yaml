# CI: heavy components disabled, minimal Prometheus, dummy SMTP credentials
kube-prometheus-stack:
  alertmanager:
    enabled: false

  grafana:
    enabled: false

  nodeExporter:
    enabled: false

  prometheus:
    prometheusSpec:
      retention: 1h
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "512Mi"
          cpu: "300m"
      storageSpec: {}

# Dummy credentials so the Secret renders without error (alertmanager disabled)
alertmanagerConfig:
  smtp:
    host: "localhost:25"
    from: "ci@localhost"
    username: "ci"
    password: "ci"
    to: "ci@localhost"
