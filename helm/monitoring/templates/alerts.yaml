apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: taskflow-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: taskflow
      rules:
        - alert: HighP95Latency
          expr: histogram_quantile(0.95, sum by(job, le) (rate(http_request_duration_ms_bucket{job=~".*task-service.*"}[1m]))) > 500
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "P95 latency for task-service is above 500ms"