apiVersion: v1
kind: Secret
metadata:
  name: taskflow-alertmanager-config
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      smtp_smarthost: {{ .Values.alertmanagerConfig.smtp.host | quote }}
      smtp_from: {{ .Values.alertmanagerConfig.smtp.from | quote }}
      smtp_auth_username: {{ .Values.alertmanagerConfig.smtp.username | quote }}
      smtp_auth_password: {{ .Values.alertmanagerConfig.smtp.password | quote }}
    receivers:
      - name: email
        email_configs:
          - to: {{ .Values.alertmanagerConfig.smtp.to | quote }}
            send_resolved: true
    route:
      receiver: email
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
